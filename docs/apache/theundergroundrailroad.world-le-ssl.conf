<VirtualHost *:443>
    ServerAdmin webmaster@theundergroundrailroad.world
    ServerName www.theundergroundrailroad.world
    DocumentRoot /var/www/tugrr-storage1

    # SSL Configuration
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/theundergroundrailroad.world/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/theundergroundrailroad.world/privkey.pem
    SSLCertificateChainFile /etc/letsencrypt/live/theundergroundrailroad.world/chain.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    # SSL Proxy Settings
    SSLProxyEngine On
    SSLProxyVerify off
    SSLProxyCheckPeerCN off
    SSLProxyCheckPeerName off
    SSLProxyProtocol +TLSv1.2 +TLSv1.3

    # ============================================================================
    # WEBSOCKET REWRITE RULES (Order Matters!)
    # ============================================================================
    RewriteEngine On

    # 1. CamBridge WebSocket (plain ws -> Node on 8447)
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteCond %{HTTP:Connection} =upgrade [NC]
    RewriteRule ^/cambridge/ws$ ws://127.0.0.1:8447/cambridge/ws [P,L]

    # 2. DINA WebSocket (Existing - Keep as is)
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteCond %{HTTP:Connection} =upgrade [NC]
    RewriteRule ^/dina/(.*) wss://127.0.0.1:8445/dina/$1 [P,L]

    # 3. Mirror WebSocket Rules (FIXED - RewriteRule only, no ProxyPass conflict)
    # Group WebSocket path: /mirror/groups/ws (for authenticated connections)
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteCond %{HTTP:Connection} =upgrade [NC]
    RewriteRule ^/mirror/groups/ws$ wss://127.0.0.1:8444/mirror/groups/ws [P,L]

    # Original WebSocket path: /ws (for protocol-based connections)
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteCond %{HTTP:Connection} =upgrade [NC]
    RewriteRule ^/ws$ wss://127.0.0.1:8444/ws [P,L]

    # Catch-all Mirror WebSocket rule (for any other /mirror/ WebSocket paths)
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteCond %{HTTP:Connection} =upgrade [NC]
    RewriteRule ^/mirror/(.*) wss://127.0.0.1:8444/mirror/$1 [P,L]

    # ============================================================================
    # HTTP/HTTPS PROXY CONFIGURATION
    # ============================================================================

    # Admin API (must be BEFORE static alias to catch /admin/api requests)
    ProxyPass /admin/api http://127.0.0.1:8446/admin/api
    ProxyPassReverse /admin/api http://127.0.0.1:8446/admin/api

    # CamBridge API (plain http -> Node on 8447; BEFORE the static alias)
    ProxyPass /cambridge/api http://127.0.0.1:8447/cambridge/api
    ProxyPassReverse /cambridge/api http://127.0.0.1:8447/cambridge/api

    # Gabriel Gomez API (plain http -> Node on 8448; BEFORE the static alias)
    ProxyPass /GabrielGomez/api http://127.0.0.1:8448/GabrielGomez/api
    ProxyPassReverse /GabrielGomez/api http://127.0.0.1:8448/GabrielGomez/api

    # Mirror HTTP (AFTER WebSocket rules to avoid conflicts)
    ProxyPass /mirror https://127.0.0.1:8444/mirror
    ProxyPassReverse /mirror https://127.0.0.1:8444/mirror

    # DINA HTTP
    ProxyPass /dina https://127.0.0.1:8445/dina
    ProxyPassReverse /dina https://127.0.0.1:8445/dina

    # ============================================================================
    # STATIC FILES
    # ============================================================================
    Alias "/admin" "/var/www/admin"
    <Directory "/var/www/admin">
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # SPA fallback: route all non-file requests to index.html
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ /admin/index.html [L]
    </Directory>

    Alias "/Mirror" "/var/www/mirror-client/dist"
    <Directory "/var/www/mirror-client/dist">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # CamBridge static client (Vite build output)
    RedirectMatch 301 ^/cambridge$ /cambridge/
    Alias "/cambridge" "/var/www/CamBridge/client/dist"
    <Directory "/var/www/CamBridge/client/dist">
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Gabriel Gomez portfolio + SonSoul (Vite build output — Mirror convention).
    # SPA history fallback / clean URLs handled by dist/.htaccess (AllowOverride All).
    RedirectMatch 301 ^/GabrielGomez$ /GabrielGomez/
    Alias "/GabrielGomez" "/var/www/GabrielGomez/client/dist"
    <Directory "/var/www/GabrielGomez/client/dist">
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # ============================================================================
    # LOGGING
    # ============================================================================
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

</VirtualHost>
