<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover lets the app draw under the iOS notch / home
         indicator; components pad with env(safe-area-inset-*) so nothing hides. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta
      name="description"
      content="Gabriel Gomez — developer, creator, and musician. Portfolio and home of SonSoul: cloudy, ethereal, alternative beats & sample packs."
    />

    <!-- PWA / installability -->
    <link rel="icon" type="image/svg+xml" href="/GabrielGomez/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/GabrielGomez/favicon-32x32.png" />
    <link rel="apple-touch-icon" href="/GabrielGomez/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SonSoul" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@200;300;400;500&display=swap"
      rel="stylesheet"
    />

    <!-- iOS standalone splash screens (exact device viewports). -->
    <link rel="apple-touch-startup-image"
          media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
          href="/GabrielGomez/splash/apple-splash-1290-2796.png" />
    <link rel="apple-touch-startup-image"
          media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
          href="/GabrielGomez/splash/apple-splash-1284-2778.png" />
    <link rel="apple-touch-startup-image"
          media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
          href="/GabrielGomez/splash/apple-splash-1179-2556.png" />
    <link rel="apple-touch-startup-image"
          media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
          href="/GabrielGomez/splash/apple-splash-1170-2532.png" />
    <link rel="apple-touch-startup-image"
          media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
          href="/GabrielGomez/splash/apple-splash-1125-2436.png" />
    <link rel="apple-touch-startup-image"
          media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
          href="/GabrielGomez/splash/apple-splash-828-1792.png" />
    <link rel="apple-touch-startup-image"
          media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
          href="/GabrielGomez/splash/apple-splash-750-1334.png" />
    <link rel="apple-touch-startup-image"
          media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
          href="/GabrielGomez/splash/apple-splash-2048-2732.png" />

    <title>Gabriel Gomez</title>
  </head>
